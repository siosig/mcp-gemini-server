# Release to npm via Trusted Publishing (OIDC) — no long-lived npm token.
#
# Triggered by pushing an annotated tag `vX.Y.Z` (or a manual dispatch). The job
# exchanges a short-lived GitHub OIDC token for npm publish credentials, so there
# is no secret to store, leak, or rotate. Provenance attestations are generated
# automatically (this is a public repo). The version guard enforces the
# package.json == git tag == npm three-way agreement the release policy requires.
#
# One-time setup (done on npmjs.com; cannot be automated here):
#   mcp-gemini-server → Settings → Trusted Publisher → GitHub Actions
#     organization/user: siosig
#     repository:        mcp-gemini-server
#     workflow:          release.yml
#     environment:       (blank)
#     allowed actions:   Allow npm publish

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # allow a manual re-publish without cutting a new tag

# Avoid two releases racing on the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    # Never run from forks (they cannot hold the trusted-publisher identity).
    if: github.repository == 'siosig/mcp-gemini-server'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required: OIDC token exchange with npm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1; pin to a current CLI.
      - name: Upgrade npm (OIDC-capable)
        run: npm install -g npm@latest

      # `registry-url` makes setup-node write the `registry=` line npm's OIDC code
      # path needs, but it ALSO writes `//registry.npmjs.org/:_authToken=
      # ${NODE_AUTH_TOKEN}`. With no token that placeholder expands to empty, so
      # npm treats the registry as already authenticated and SKIPS OIDC entirely
      # (publish then fails ENEEDAUTH/E404). Remove only that token line; the
      # registry line stays, so OIDC fires. See npm/documentation#1960.
      - name: Enable OIDC (strip placeholder _authToken from .npmrc)
        run: sed -i '/_authToken/d' "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Git tag ($TAG) does not match package.json ($PKG). Refusing to publish."
            exit 1
          fi

      - name: Build
        run: npm run build

      # No NODE_AUTH_TOKEN: credentials come from the OIDC exchange. Provenance is
      # generated automatically under trusted publishing.
      - name: Publish to npm
        run: npm publish
