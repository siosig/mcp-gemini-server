name: release

# Cross-compile the Rust binary for every supported platform and publish the
# archives as GitHub Release assets. Triggered by pushing an annotated `vX.Y.Z`
# tag. Asset names match the pattern install_claude_plugin.sh downloads:
#   mcp-gemini-server-{linux|darwin|windows}-{x86_64|aarch64}.{tar.gz|zip}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            asset: mcp-gemini-server-linux-x86_64.tar.gz
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            asset: mcp-gemini-server-linux-aarch64.tar.gz
            cross: true
          - target: aarch64-apple-darwin
            os: macos-14
            asset: mcp-gemini-server-darwin-aarch64.tar.gz
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            asset: mcp-gemini-server-windows-x86_64.zip
            cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar czf "${{ matrix.asset }}" -C "target/${{ matrix.target }}/release" mcp-gemini-server

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/mcp-gemini-server.exe" -DestinationPath "${{ matrix.asset }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
