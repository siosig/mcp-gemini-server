name: Secret scan

# Server-side gate (can't be bypassed with --no-verify). secretlint runs the committed
# preset config; the private denylist is local-only by design and enforced by the pre-commit
# hook. gitleaks adds broad coverage plus a full git-history scan.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  secretlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx -y -p secretlint@13 -p @secretlint/secretlint-rule-preset-recommend -p @secretlint/secretlint-rule-pattern secretlint "**/*"

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact --verbose --exit-code 1
